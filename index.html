<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Animated Workspace</title>
    <style>
        /* Animated Matrix Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Custom Neon Crosshair Cursor */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><line x1="16" y1="4" x2="16" y2="28" stroke="%2300ffcc" stroke-width="2"/><line x1="4" y1="16" x2="28" y2="16" stroke="%2300ffcc" stroke-width="2"/><circle cx="16" cy="16" r="4" fill="none" stroke="%2300ffcc" stroke-width="2"/></svg>') 16 16, auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Central Control Dashboard */
        .container {
            background: rgba(20, 20, 20, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            width: 350px;
            z-index: 1;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* App Action Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            cursor: inherit;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:hover {
            background-color: #20ba59;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        .music-btn {
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #111;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
        }

        .music-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.7);
        }

        /* Music control pulsing animation when playing */
        .playing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        .btn svg {
            margin-right: 10px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <h1>DASHBOARD</h1>

        <a href="https://web.whatsapp.com/" target="_blank" class="btn whatsapp-btn">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.944 0c3.172.001 6.155 1.234 8.397 3.477 2.242 2.242 3.472 5.224 3.472 8.397 0 6.549-5.337 11.93-11.884 11.93-2.007-.001-3.982-.51-5.734-1.482L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.413 9.86-9.845 0-2.63-1.023-5.101-2.882-6.959C16.528 1.886 14.062.862 11.429.862c-5.44 0-9.866 4.414-9.867 9.847 0 1.696.447 3.353 1.295 4.811L1.826 21.8l6.452-1.692zM17.367 14.38c-.327-.164-1.938-.955-2.239-1.064-.301-.109-.52-.164-.738.164-.219.329-.847 1.064-1.039 1.283-.192.219-.384.246-.711.082-.327-.164-1.381-.509-2.631-1.624-.973-.867-1.63-1.94-1.821-2.268-.192-.329-.02-.507.144-.671.147-.148.327-.383.491-.574.164-.192.219-.328.327-.546.109-.218.055-.41-.027-.574-.082-.164-.738-1.777-1.011-2.433-.267-.641-.539-.554-.738-.564-.192-.01-.41-.01-.628-.01-.218 0-.573.082-.873.41-.3.328-1.147 1.12-1.147 2.733 0 1.614 1.174 3.171 1.338 3.39.164.218 2.312 3.53 5.599 4.945.781.337 1.391.537 1.866.689.784.249 1.498.214 2.061.13.628-.094 1.938-.792 2.211-1.558.272-.766.272-1.422.192-1.557-.081-.134-.301-.218-.628-.382z"/></svg>
            WhatsApp
        </a>

        <button id="musicToggle" class="btn music-btn">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M23 0l-14.5 2.822v15.053c-.714-.543-1.6-.875-2.58-.875-2.436 0-4.42 1.984-4.42 4.42s1.984 4.42 4.42 4.42c2.395 0 4.347-1.93 4.412-4.307l.008-.113v-13.435l11.588-2.254v9.643c-.714-.543-1.6-.875-2.58-.875-2.436 0-4.42 1.984-4.42 4.42s1.984 4.42 4.42 4.42c2.395 0 4.347-1.93 4.412-4.307l.008-.113v-16.143z"/></svg>
            <span id="musicText">Favorite Music</span>
        </button>
    </div>

    <audio id="bgMusic" src="music/1.mp3" loop></audio>

    <script>
        // 1. Matrix Background Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&';
        const alphabet = letters.split('');
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = 1;
            }
        }
        initRain();
        window.addEventListener('resize', initRain);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ffcc';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // 2. Local Audio Engine Player
        const musicBtn = document.getElementById('musicToggle');
        const musicText = document.getElementById('musicText');
        const audio = document.getElementById('bgMusic');

        musicBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => {
                    musicText.innerText = "Playing Limerence...";
                    musicBtn.classList.add('playing');
                }).catch(error => {
                    alert("Make sure you saved '1.mp3' inside a folder named 'music' right next to this file!");
                    console.error("Playback block or file missing:", error);
                });
            } else {
                audio.pause();
                musicText.innerText = "Favorite Music";
                musicBtn.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
